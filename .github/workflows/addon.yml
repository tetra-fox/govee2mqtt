name: Home Assistant add-on

on:
  # build after the app image so the wrapper can pull the tag it references:
  # the stable add-on wraps the release version, the edge add-on wraps :edge
  workflow_run:
    workflows: ["Build Docker image"]
    types: [completed]

permissions:
  contents: read

jobs:
  build:
    # only on a successful release or main-push image build, not PR builds
    if: ${{ github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.event == 'release' || github.event.workflow_run.event == 'push') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, aarch64]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Select add-on
        id: sel
        env:
          TRIGGER_EVENT: ${{ github.event.workflow_run.event }}
        run: |
          if [ "$TRIGGER_EVENT" = "release" ]; then
            echo "dir=addon" >> "$GITHUB_OUTPUT"
          else
            echo "dir=addon-edge" >> "$GITHUB_OUTPUT"
          fi
      - name: Assemble build inputs from common/
        env:
          ADDON_DIR: ${{ steps.sel.outputs.dir }}
        run: cp common/Dockerfile common/build.yaml common/run.sh "$ADDON_DIR/"
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish
        uses: home-assistant/builder@2026.02.1
        with:
          args: |
            --${{ matrix.arch }} \
            --target ${{ steps.sel.outputs.dir }} \
            --no-latest
