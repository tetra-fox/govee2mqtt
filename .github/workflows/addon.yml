name: Home Assistant add-on

on:
  # build after the daemon image so cache is warm; the add-on compiles the same
  # source but into the HA base image
  workflow_run:
    workflows: ["Build Docker image"]
    types: [completed]

env:
  ARCHITECTURES: '["amd64", "aarch64"]'

permissions:
  contents: read

jobs:
  init:
    # only on a successful release or main-push build, not PR builds
    if: ${{ github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.event == 'release' || github.event.workflow_run.event == 'push') }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      image_name: ${{ steps.sel.outputs.image_name }}
      tag: ${{ steps.sel.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      # release publishes the stable add-on manifest, a main push publishes edge
      - name: Select add-on variant
        id: sel
        env:
          TRIGGER_EVENT: ${{ github.event.workflow_run.event }}
        run: |
          if [ "$TRIGGER_EVENT" = "release" ]; then
            echo "image_name=govee2mqtt-addon" >> "$GITHUB_OUTPUT"
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "image_name=govee2mqtt-addon-edge" >> "$GITHUB_OUTPUT"
            echo "tag=edge" >> "$GITHUB_OUTPUT"
          fi
      - name: Build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.03.2
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: ${{ steps.sel.outputs.image_name }}

  build:
    needs: init
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.init.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build the add-on image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: addon
          platforms: linux/${{ matrix.arch == 'aarch64' && 'arm64' || 'amd64' }}
          # BUILD_ARCH selects the matching HA debian base in the Dockerfile;
          # GOVEE_CI_TAG is the version string build.rs embeds
          build-args: |
            BUILD_ARCH=${{ matrix.arch }}
            GOVEE_CI_TAG=${{ github.event.workflow_run.head_sha }}
          tags: ${{ matrix.image }}:${{ needs.init.outputs.tag }}
          push: true
          cache-from: type=gha,scope=addon-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=addon-${{ matrix.arch }}

  manifest:
    needs: [init, build]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.03.2
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: ${{ needs.init.outputs.image_name }}
          image-tags: ${{ needs.init.outputs.tag }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
