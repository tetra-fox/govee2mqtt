name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: govee2mqtt-linux-amd64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            artifact: govee2mqtt-linux-arm64

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      # musl linker for the static target; cmake/perl/pkg-config (needed by
      # aws-lc-sys and rusqlite bundled) ship on the runner
      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        # build.rs embeds the version; strip the leading v from the v* tag so it
        # is the bare semver (v1.2.3 -> 1.2.3)
        env:
          GOVEE2MQTT_RELEASE_TAG: ${{ github.ref_name }}
        run: |
          export GOVEE2MQTT_RELEASE_TAG="${GOVEE2MQTT_RELEASE_TAG#v}"
          cargo build --release --target ${{ matrix.target }} --bin govee2mqtt

      - name: Rename binary
        run: mv "target/${{ matrix.target }}/release/govee2mqtt" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: govee2mqtt-*
