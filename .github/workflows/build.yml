name: Build Docker image

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - "**/*.rs"
      - "**/Cargo.*"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/build.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.rs"
      - "**/Cargo.*"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/build.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # only collapse rapid edge builds; never cancel a release
  cancel-in-progress: ${{ github.event_name == 'push' }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    if: ${{ github.event_name == 'release' }}
    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      output: image
      push: true
      platforms: linux/amd64,linux/arm64
      build-args: |
        GOVEE_CI_TAG=${{ github.event.release.tag_name }}
      set-meta-labels: true
      set-meta-annotations: true
      meta-images: ghcr.io/${{ github.repository }}
      meta-tags: |
        type=semver,pattern={{version}}
        type=semver,pattern={{major}}.{{minor}}
        type=semver,pattern={{major}}
        type=raw,value=latest
      cache: true
      cache-mode: max
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  # push an :edge image from main so the dev add-on can track unreleased code
  edge:
    if: ${{ github.event_name == 'push' }}
    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      output: image
      push: true
      platforms: linux/amd64,linux/arm64
      build-args: |
        GOVEE_CI_TAG=edge-${{ github.sha }}
      set-meta-labels: true
      set-meta-annotations: true
      meta-images: ghcr.io/${{ github.repository }}
      meta-tags: |
        type=raw,value=edge
      cache: true
      cache-mode: max
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  # build the image on PRs without pushing, one platform per native runner, to
  # catch a broken Dockerfile before a release is cut
  pr-build:
    if: ${{ github.event_name == 'pull_request' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
          - os: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
