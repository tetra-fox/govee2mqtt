name: Build images

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - "**/*.rs"
      - "**/Cargo.*"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/build.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.rs"
      - "**/Cargo.*"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/build.yml"

env:
  DAEMON_IMAGE: ghcr.io/${{ github.repository_owner }}/govee2mqtt
  ADDON_IMAGE: ghcr.io/${{ github.repository_owner }}/govee2mqtt-addon

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # only collapse rapid edge builds; never cancel a release
  cancel-in-progress: ${{ github.event_name == 'push' }}

permissions:
  contents: read

jobs:
  init:
    runs-on: ubuntu-latest
    outputs:
      # raw facts build.rs composes the embedded version from: release_tag on a
      # release (v stripped), build_sha otherwise.
      release_tag: ${{ steps.meta.outputs.release_tag }}
      build_sha: ${{ steps.meta.outputs.build_sha }}
      # the tag set applied to both the daemon and add-on manifests: version +
      # latest on a release, edge otherwise
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Compute version facts and image tags
        id: meta
        env:
          EVENT: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT" = "release" ]; then
            # release.yml tags are v<semver>; build.rs wants the bare semver
            release_tag="${RELEASE_TAG#v}"
            build_sha=""
            tags="${release_tag}"$'\n'"latest"
          else
            release_tag=""
            build_sha="${SHA}"
            tags="edge"
          fi
          {
            echo "release_tag=${release_tag}"
            echo "build_sha=${build_sha}"
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  # each arch builds on its own native runner (no QEMU) and pushes an untagged
  # image by digest; the manifest job below stitches the digests into one
  # multiarch tag, so no per-arch images are published.
  daemon:
    needs: init
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: amd64, os: ubuntu-24.04, platform: linux/amd64 }
          - { arch: aarch64, os: ubuntu-24.04-arm, platform: linux/arm64 }
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: standalone
          platforms: ${{ matrix.platform }}
          # BUILD_ARCH picks the rust musl target in the builder stage; it must
          # match the build platform or the build cross-compiles and fails for
          # want of the matching musl gcc toolchain
          build-args: |
            BUILD_ARCH=${{ matrix.arch }}
            GOVEE2MQTT_RELEASE_TAG=${{ needs.init.outputs.release_tag }}
            GOVEE2MQTT_BUILD_SHA=${{ needs.init.outputs.build_sha }}
          outputs: type=image,name=${{ env.DAEMON_IMAGE }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}
          cache-from: type=gha,scope=daemon-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=daemon-${{ matrix.arch }}
      - name: Export digest
        if: ${{ github.event_name != 'pull_request' }}
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
      - name: Upload digest
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v4
        with:
          name: digests-daemon-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  daemon-manifest:
    needs: [init, daemon]
    # PRs only validate the per-arch builds; nothing is pushed to stitch
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-daemon-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multiarch manifest
        working-directory: /tmp/digests
        env:
          IMAGE: ${{ env.DAEMON_IMAGE }}
          TAGS: ${{ needs.init.outputs.tags }}
        run: |
          args=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && args+=( --tag "${IMAGE}:${tag}" )
          done <<< "$TAGS"
          for digest in *; do
            args+=( "${IMAGE}@sha256:${digest}" )
          done
          docker buildx imagetools create "${args[@]}"

  # the add-on is not built on PRs. runs after the daemon so the shared builder
  # layers are warm in the gha cache.
  addon:
    if: ${{ github.event_name != 'pull_request' }}
    needs: [init, daemon]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: amd64, os: ubuntu-24.04, platform: linux/amd64 }
          - { arch: aarch64, os: ubuntu-24.04-arm, platform: linux/arm64 }
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: addon
          platforms: ${{ matrix.platform }}
          build-args: |
            BUILD_ARCH=${{ matrix.arch }}
            GOVEE2MQTT_RELEASE_TAG=${{ needs.init.outputs.release_tag }}
            GOVEE2MQTT_BUILD_SHA=${{ needs.init.outputs.build_sha }}
          outputs: type=image,name=${{ env.ADDON_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          # the builder stage is identical to the daemon's, so read its cache too
          cache-from: |
            type=gha,scope=addon-${{ matrix.arch }}
            type=gha,scope=daemon-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=addon-${{ matrix.arch }}
      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-addon-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  addon-manifest:
    if: ${{ github.event_name != 'pull_request' }}
    needs: [init, addon]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-addon-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multiarch manifest
        working-directory: /tmp/digests
        env:
          IMAGE: ${{ env.ADDON_IMAGE }}
          TAGS: ${{ needs.init.outputs.tags }}
        run: |
          args=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && args+=( --tag "${IMAGE}:${tag}" )
          done <<< "$TAGS"
          for digest in *; do
            args+=( "${IMAGE}@sha256:${digest}" )
          done
          docker buildx imagetools create "${args[@]}"
