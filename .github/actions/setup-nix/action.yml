name: Setup Nix
description: install nix with flakes enabled and restore the nix store from GHA cache

inputs:
  cache-prefix:
    description: per-job cache key prefix, so jobs don't clobber each other's caches
    required: true

runs:
  using: composite
  steps:
    - name: Install Nix
      uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=https://github.com/NixOS/nixpkgs/archive/refs/heads/nixos-unstable.tar.gz
        extra_nix_config: |
          experimental-features = nix-command flakes
          access-tokens = github.com=${{ github.token }}

    - uses: nix-community/cache-nix-action@v7
      with:
        primary-key: nix-${{ runner.os }}-${{ inputs.cache-prefix }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
        restore-prefixes-first-match: nix-${{ runner.os }}-${{ inputs.cache-prefix }}-
        gc-max-store-size-linux: 1G
        purge: true
        purge-prefixes: nix-${{ runner.os }}-${{ inputs.cache-prefix }}-
        purge-created: 0
        purge-primary-key: never
