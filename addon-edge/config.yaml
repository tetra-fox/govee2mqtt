name: Govee2MQTT Edge
image: ghcr.io/tetra-fox/govee2mqtt-addon
version: "edge"
slug: govee2mqtt_edge
description: Control Govee Devices
url: https://github.com/tetra-fox/govee2mqtt
arch:
  - amd64
  - aarch64
init: false
startup: services
services:
  - mqtt:need

stage: experimental

apparmor: true

ingress: true
ingress_port: 8056

# Host network access is required for LAN discovery
host_network: true

# Direct BLE control (enable_ble) talks to the host BlueZ stack over the system
# D-Bus; harmless to grant when BLE is unused.
host_dbus: true

map:
  - type: addon_config
    read_only: false
    path: /app/config

options:
  temperature_scale: "C"

schema:
  temperature_scale: "str?"
  availability_timeout: "int?"
  govee_email: "str?"
  govee_password: "password?"
  govee_api_key: "password?"
  mqtt_host: "str?"
  mqtt_port: "int?"
  mqtt_username: "str?"
  mqtt_password: "password?"
  mqtt_base_topic: "str?"
  debug_level: "str?"
  no_multicast: "bool?"
  broadcast_all: "bool?"
  global_broadcast: "bool?"
  scan: "str?"
  enable_ble: "bool?"
